name: Deploy Frontend

on:
  push:
    branches: [main]

jobs:
  build-frontend:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install Dependencies
        run: npm install

      - name: Build Frontend
        run: npm run build

  deploy-frontend:
    runs-on: ubuntu-latest
    needs: build-frontend  # only deploy if build succeeds

    steps:
      - name: Deploy Frontend to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SECRETS_EC2_HOST }}
          username: ${{ secrets.SECRETS_EC2_USER }}
          key: ${{ secrets.SECRETS_EC2_SSH_KEY }}
          script: |
            echo "🚀 Deploying Frontend..."

            cd ~/Frontend
            git pull origin main
            npm install
            npm run build
            sudo cp -r dist/* /var/www/html/

            echo "✅ Frontend deployed"
